global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'api-backend'
    static_configs:
      - targets: ['api-backend:8080']
    metrics_path: /metrics

  - job_name: 'worker'
    static_configs:
      - targets: ['worker:9101']
    metrics_path: /metrics

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
