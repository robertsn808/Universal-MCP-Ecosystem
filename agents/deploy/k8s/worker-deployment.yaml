apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels: { app: worker }
  template:
    metadata:
      labels: { app: worker }
    spec:
      containers:
        - name: worker
          image: yourrepo/worker:latest
          ports:
            - containerPort: 9101
          env:
            - name: WORKER_METRICS_PORT
              value: "9101"
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9101
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9101
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: worker-metrics
spec:
  selector: { app: worker }
  ports:
    - port: 9101
      targetPort: 9101

