apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend
spec:
  replicas: 1
  selector:
    matchLabels: { app: api-backend }
  template:
    metadata:
      labels: { app: api-backend }
    spec:
      containers:
        - name: api-backend
          image: yourrepo/api-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-backend
spec:
  selector: { app: api-backend }
  ports:
    - port: 8080
      targetPort: 8080

